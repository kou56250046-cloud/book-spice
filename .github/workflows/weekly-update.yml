name: 週次データ更新

on:
  schedule:
    # 毎週土曜 22:00 UTC = 日本時間 日曜 07:00
    - cron: '0 22 * * 6'
  workflow_dispatch:
    # 手動実行（テスト・緊急更新用）

jobs:
  update-books:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # books.json のコミット・プッシュに必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js 20 をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 楽天ブックスAPIからデータを取得
        env:
          RAKUTEN_APP_ID:     ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
        run: node scripts/fetch-books.js

      - name: 変更があればコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add books.json
          if git diff --staged --quiet; then
            echo "books.json に変更なし。スキップします。"
          else
            git commit -m "週次更新: $(date +'%Y-%m-%d')"
            git push
          fi
